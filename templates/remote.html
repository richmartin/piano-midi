<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Piano Remote</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --accent-color: #bb86fc;
            --secondary-color: #03dac6;
            --surface-color: #1e1e1e;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            /* Prevent scrolling on main screen */
            touch-action: manipulation;
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            max-width: 600px;
            /* Limit width on tablets/desktop */
            margin: 0 auto;
            padding: 20px;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 1rem;
            flex-shrink: 0;
        }

        h1 {
            font-size: 1.2rem;
            margin: 0;
            color: var(--accent-color);
            opacity: 0.8;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .track-info {
            text-align: center;
            margin-bottom: 3rem;
            width: 100%;
        }

        #track-title {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0 10px;
        }

        #connection-status {
            font-size: 0.9rem;
            color: #888;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            width: 100%;
            margin-bottom: 2rem;
        }

        .btn {
            background-color: var(--surface-color);
            border: none;
            border-radius: 50%;
            color: var(--text-color);
            font-size: 1.5rem;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            background-color: #333;
            transform: scale(0.95);
        }

        .btn-large {
            width: 100px;
            height: 100px;
            font-size: 3rem;
            background-color: var(--accent-color);
            color: #000;
        }

        .btn.active {
            color: var(--secondary-color);
            background-color: #333;
        }

        footer {
            width: 100%;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .volume-container {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 1rem;
            padding: 0 10px;
            box-sizing: border-box;
        }

        input[type=range] {
            flex-grow: 1;
            height: 6px;
            background: #333;
            border-radius: 3px;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: var(--secondary-color);
            border-radius: 50%;
            cursor: pointer;
        }

        /* Browse Modal */
        #browse-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            z-index: 200;
            display: flex;
            flex-direction: column;
        }

        #browse-modal.hidden {
            display: none;
        }

        .browse-header {
            padding: 15px;
            background-color: var(--surface-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #333;
            flex-shrink: 0;
        }

        .browse-header h2 {
            margin: 0;
            font-size: 1.2rem;
            flex-grow: 1;
            text-align: center;
        }

        .browse-header button {
            background: none;
            border: none;
            color: var(--text-color);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 5px;
        }

        #browse-content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .browse-item {
            padding: 15px;
            border-bottom: 1px solid #333;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .browse-item:hover {
            background-color: var(--surface-color);
        }

        .browse-item-title {
            font-size: 1rem;
        }

        .browse-item-count {
            color: #888;
            font-size: 0.8rem;
        }

        .play-all-btn {
            width: 100%;
            padding: 15px;
            background-color: var(--accent-color);
            color: #000;
            border: none;
            font-weight: bold;
            font-size: 1rem;
            margin-bottom: 10px;
            border-radius: 4px;
            cursor: pointer;
        }

        #debug-log {
            width: 100%;
            height: 100px;
            overflow-y: auto;
            background: #000;
            border: 1px solid #333;
            color: #0f0;
            font-family: monospace;
            font-size: 0.7rem;
            padding: 5px;
            border-radius: 4px;
            margin-top: 10px;
            display: none;
            /* Hide by default, toggle if needed? Or keep small */
        }

        /* Show debug log if it has content or maybe just keep it visible but small */
        #debug-log {
            display: block;
        }

        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        #loading.hidden {
            display: none;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: var(--accent-color);
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div id="loading">
        <div class="spinner"></div>
        <p>Connecting to Piano...</p>
        <div id="loading-log" style="margin-top: 20px; font-family: monospace; font-size: 0.8rem; color: #888;"></div>
    </div>

    <div class="app-container">
        <header>
            <h1>Piano Remote</h1>
        </header>

        <main>
            <div class="track-info">
                <span id="track-title">Not Playing</span>
                <div id="connection-status">Connecting...</div>
            </div>

            <div class="controls">
                <button id="shuffle-btn" class="btn"><i class="fas fa-shuffle"></i></button>
                <button id="prev-btn" class="btn"><i class="fas fa-backward-step"></i></button>
                <button id="play-pause-btn" class="btn btn-large"><i class="fas fa-play"></i></button>
                <button id="next-btn" class="btn"><i class="fas fa-forward-step"></i></button>
                <button id="browse-btn" class="btn"><i class="fas fa-music"></i></button>
            </div>
        </main>

        <footer>
            <div class="volume-container">
                <i class="fas fa-volume-down"></i>
                <input type="range" id="volume-slider" min="1" max="11" value="11">
                <i class="fas fa-volume-up"></i>
            </div>
            <div id="debug-log"></div>
        </footer>
    </div>

    <div id="browse-modal" class="hidden">
        <div class="browse-header">
            <button id="browse-back-btn" class="hidden"><i class="fas fa-arrow-left"></i></button>
            <h2 id="browse-title">Library</h2>
            <button id="browse-close-btn"><i class="fas fa-times"></i></button>
        </div>
        <div id="browse-content">
            <!-- Populated by JS -->
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script type="module" src="{{ '/static/js/RemoteClient.js' | urlencode }}"></script>
</body>

</html>
